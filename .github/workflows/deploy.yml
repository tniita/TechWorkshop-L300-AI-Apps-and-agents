name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_IMAGE_NAME: ${{ secrets.ACR_IMAGE_NAME }}
  AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --file src/Dockerfile \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG} \
            src/
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG}

      - name: Deploy to Azure Container App
        run: |
          IMAGE_TAG=${{ github.sha }}
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG} \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              FOUNDRY_API_VERSION="${{ secrets.FOUNDRY_API_VERSION }}" \
              gpt_endpoint="${{ secrets.GPT_ENDPOINT }}" \
              gpt_deployment="${{ secrets.GPT_DEPLOYMENT }}" \
              gpt_api_version="${{ secrets.GPT_API_VERSION }}" \
              embedding_endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              embedding_deployment="${{ secrets.EMBEDDING_DEPLOYMENT }}" \
              embedding_api_version="${{ secrets.EMBEDDING_API_VERSION }}" \
              phi_4_endpoint="${{ secrets.PHI_4_ENDPOINT }}" \
              phi_4_deployment="${{ secrets.PHI_4_DEPLOYMENT }}" \
              phi_4_api_version="${{ secrets.PHI_4_API_VERSION }}" \
              COSMOS_ENDPOINT="${{ secrets.COSMOS_ENDPOINT }}" \
              DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
              CONTAINER_NAME="${{ secrets.CONTAINER_NAME }}" \
              storage_account_name="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              storage_container_name="${{ secrets.STORAGE_CONTAINER_NAME }}" \
              APPLICATIONINSIGHTS_CONNECTION_STRING="${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}" \
              customer_loyalty="${{ secrets.CUSTOMER_LOYALTY }}" \
              inventory_agent="${{ secrets.INVENTORY_AGENT }}" \
              interior_designer="${{ secrets.INTERIOR_DESIGNER }}" \
              cora="${{ secrets.CORA }}" \
              cart_manager="${{ secrets.CART_MANAGER }}" \
              handoff_service="${{ secrets.HANDOFF_SERVICE }}"