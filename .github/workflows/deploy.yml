name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_IMAGE_NAME: ${{ secrets.ACR_IMAGE_NAME }}
  AZURE_CONTAINER_APP_NAME: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --file src/Dockerfile \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG} \
            src/
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG}

      - name: Deploy to Azure Container App
        run: |
          IMAGE_TAG=${{ github.sha }}
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${IMAGE_TAG} \
            --set-env-vars \
              FOUNDRY_ENDPOINT=secretref:foundry-endpoint \
              gpt_endpoint=secretref:gpt-endpoint \
              embedding_endpoint=secretref:embedding-endpoint \
              phi_4_endpoint=secretref:phi-4-endpoint